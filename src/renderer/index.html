<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>风灵月影宗</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- 左侧边栏 -->
      <div class="sidebar">
        <h2 class="logo">风灵月影宗</h2>
        <ul class="menu">
          <li><a href="#home" class="nav-link" data-page="home">首页</a></li>
          <li><a href="#all-games" class="nav-link" data-page="all-games">所有游戏</a></li>
          <li><a href="#cheats" class="nav-link" data-page="cheats">我的工具</a></li>
          <li><a href="#settings" class="nav-link" data-page="settings">设置</a></li>
          <li><a href="#about" class="nav-link" data-page="about">关于</a></li>
        </ul>
        <!-- 官方网站放在底部 -->
        <!-- <ul class="menu bottom-menu">
          <li>
            <a href="#website" class="nav-link website-link" id="website-link"
              >风灵月影官方网站</a
            >
          </li>
        </ul> -->
      </div>

      <!-- 主内容区 -->
      <div class="content" id="content">
        <!-- 首页 -->
        <div id="home" class="page">
          <h1>欢迎来到风灵月影宗</h1>
          <div id="welcome-content"></div>
        </div>

        <!-- 所有游戏 -->
        <div id="all-games" class="page hidden">
          <h2>所有游戏</h2>
          <!-- 搜索框 + 按钮 -->
          <div class="search-box">
            <input
              type="text"
              id="gameSearch"
              placeholder="输入游戏名称搜索..."
              autocomplete="off"
            />
            <button type="button" class="search-btn" onclick="performSearch()">
              搜索
            </button>
          </div>
          <span class="clear-search" onclick="clearSearchInput()">×</span>
          <h3>游戏列表</h3>
            <!-- 搜索结果（动态插入） -->
            <div id="search-results-container" style="display: none;">
              <h4>搜索结果</h4>
                <div id="search-results" class="game-list"></div>
            </div>
            <!-- 最近更新容器 -->
            <div id="games-container" class="game-list"></div>
        </div>
      
      <!-- 我的工具 -->
      <div id="cheats" class="page hidden">
        <h2>我的工具</h2>
        <!-- 页签按钮 -->
        <div class="tabs">
          <button class="tab-btn active" data-tab="downloaded">已下载</button>
          <button class="tab-btn" data-tab="downloading">下载任务</button>
          <button class="tab-btn" data-tab="favorite">收藏</button>
        </div>
        <!-- 页签内容 -->
        <div class="tab-content">
          <div id="downloaded" class="tab-pane">
          </div>
          <div id="downloading" class="tab-pane hidden">
            <p>当前下载任务：</p>
            <div id="download-tasks">
              <p>暂无下载任务</p>
            </div>
          </div>
          <div id="favorite" class="tab-pane hidden">
            <p>这功能还没做呢</p>
            <ul></ul>
          </div>
        </div>
      </div>
      <!-- 设置 -->
      <div id="settings" class="page hidden">
        <h2>设置</h2>
        <div class="settings-section">
          <h3>下载设置</h3>
          <div class="setting-item">
            <label for="download-folder">下载文件夹:</label>
            <input type="text" id="download-folder" placeholder="请选择下载文件夹路径">
            <button id="select-folder-btn" class="btn">选择文件夹</button>
            <p class="setting-description">所有下载任务的文件都会保存到此文件夹，应用的文件管理功能（如查看、打开、删除）也基于此目录。</p>
          </div>
        </div>
      </div>
      <!-- 关于 -->
      <div id="about" class="page hidden">
        <h2>关于本软件</h2>
        <div id="about-content"></div>
      </div>
        <!-- 官方网站（隐藏页，仅用于跳转） -->
        <div id="website" class="page hidden"></div>
      </div>
    </div>

    <!-- 渲染进程脚本 -->
    <script type="module" src="./index.js"></script>
  </body>
</html>
