<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>风灵月影宗</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- 自定义标题栏 -->
    <div class="title-bar">
      <div class="title-bar-left">
        <img src="./public/pic/default.png" alt="图标" class="title-bar-icon" />
        <span class="title-bar-text">风灵月影宗</span>
      </div>
      <div class="title-bar-right">
        <button class="title-bar-btn minimize" id="minimize-btn" title="最小化">−</button>
        <button class="title-bar-btn maximize" id="maximize-btn" title="最大化">◻</button>
        <button class="title-bar-btn close" id="close-btn" title="关闭">✕</button>
      </div>
    </div>

    <div class="container">
      <!-- 左侧边栏 -->
      <div class="sidebar">
        <h2 class="logo">风灵月影宗</h2>
        <ul class="menu">
          <li><a href="#home" class="nav-link" data-page="home">首页</a></li>
          <li><a href="#all-games" class="nav-link" data-page="all-games">搜索</a></li>
          <li><a href="#cheats" class="nav-link" data-page="cheats">我的修改器</a></li>
          <li><a href="#settings" class="nav-link" data-page="settings">设置</a></li>
          <li><a href="#about" class="nav-link" data-page="about">关于</a></li>
        </ul>
      </div>

      <!-- 主内容区 -->
      <div class="main-content">
        <!-- 首页 -->
        <div id="home" class="page">
          <!-- 欢迎内容 -->
          <div id="welcome-content"></div>
          <!-- 最近更新区域 -->
          <div class="recent-updates-section">
            <div class="section-header">
              <h3>最近更新</h3>
              <button id="refresh-recent-updates-btn" class="btn refresh-btn" title="更新数据">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M23 4v6h-6"></path>
                  <path d="M1 20v-6h6"></path>
                  <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
              </button>
            </div>
            <div id="recent-updates-list" class="game-list"></div>
          </div>
        </div>

        <!-- 所有游戏/搜索 -->
        <div id="all-games" class="page hidden">
          <h2>搜索</h2>
          <div class="search-section">
            <div class="search-bar">
              <div class="search-input-wrapper">
                <input type="text" id="all-games-search" placeholder="搜索游戏修改器..." />
                <span id="all-games-clear-search" class="clear-search">&times;</span>
              </div>
              <button id="all-games-search-btn" class="btn search-btn">搜索</button>
            </div>
            <div id="all-games-results" class="game-list"></div>
          </div>
        </div>

        <!-- 我的修改器 -->
        <div id="cheats" class="page hidden">
          <h2>我的修改器</h2>
          <div class="tab-bar">
            <button class="tab-btn active" data-tab="downloaded">已下载</button>
            <button class="tab-btn" data-tab="downloading">下载列表</button>
          </div>
          <div id="downloaded" class="tab-pane">
            <div id="downloaded-files-list" class="installed-tools-list"></div>
          </div>
          <div id="downloading" class="tab-pane hidden">
            <div class="download-list-header">
              <div class="download-list-stats">
                <span id="download-stats-text">暂无任务</span>
              </div>
              <div class="download-list-actions">
                <button id="clear-all-tasks-btn" class="btn btn-danger">移除全部下载记录</button>
              </div>
            </div>
            <div id="download-tasks-list" class="download-tasks-list"></div>
          </div>
        </div>

        <!-- 设置 -->
        <div id="settings" class="page hidden">
          <h2>设置</h2>
          <div class="settings-section">
            <h3>下载设置</h3>
            <div class="setting-item">
              <label for="download-folder">下载文件夹:</label>
              <input type="text" id="download-folder" placeholder="请选择下载文件夹路径" />
              <button id="select-folder-btn" class="btn">选择文件夹</button>
              <button id="open-folder-btn" class="btn">打开文件夹</button>
              <p class="setting-description">所有下载任务的文件都会保存到此文件夹，应用的文件管理功能（如查看、打开、删除）也基于此目录。</p>
            </div>
          </div>
        </div>

        <!-- 关于 -->
        <div id="about" class="page hidden">
          <h2>关于本软件</h2>
          <div id="about-content"></div>
        </div>

        <!-- （隐藏页，仅用于跳转） -->
        <div id="website" class="page hidden"></div>
      </div>

      <!-- 自定义确认对话框 -->
      <div id="confirm-dialog-overlay" class="dialog-overlay hidden">
        <div class="dialog-container">
          <div class="dialog-header">
            <h3 id="confirm-dialog-title">确认操作</h3>
          </div>
          <div class="dialog-content">
            <p id="confirm-dialog-message"></p>
          </div>
          <div class="dialog-footer">
            <button id="confirm-dialog-cancel" class="btn btn-secondary">取消</button>
            <button id="confirm-dialog-confirm" class="btn btn-primary">确定</button>
          </div>
        </div>
      </div>

      <!-- 渲染进程脚本 -->
      <script type="module" src="./index.js"></script>
  </body>
</html>
